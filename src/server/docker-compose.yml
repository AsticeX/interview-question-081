services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApplyMigrationsOnStartup: "true"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=SocialDb;User ID=sa;Password=LocalDev12345;TrustServerCertificate=True;Encrypt=False"
    ports:
      - "5028:8080"
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "LocalDev12345"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
